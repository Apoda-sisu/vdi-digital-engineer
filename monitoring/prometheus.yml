global:
  scrape_interval: 15s
  evaluation_interval: 15s

# 告警规则
rule_files:
  - "alert_rules.yml"

# 告警管理器
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

# 监控目标
scrape_configs:
  # Prometheus 自身
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # VDI 知识库服务
  - job_name: 'vdi-knowledge'
    static_configs:
      - targets: ['vdi-knowledge:3000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # VDI 事件总线服务
  - job_name: 'vdi-events'
    static_configs:
      - targets: ['vdi-events:3001']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # VDI 规则引擎服务
  - job_name: 'vdi-rules'
    static_configs:
      - targets: ['vdi-rules:3002']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # VDI 文档服务
  - job_name: 'vdi-documents'
    static_configs:
      - targets: ['vdi-documents:3003']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Redis 监控
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    metrics_path: '/metrics'

  # PostgreSQL 监控
  - job_name: 'postgresql'
    static_configs:
      - targets: ['postgres:5432']
    metrics_path: '/metrics'

  # Node Exporter（系统监控）
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Nginx 监控
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:80']
    metrics_path: '/status'