# VDI 知识库检索评估数据集（Golden Set）
# 版本：V1.0
# 创建日期：2026-05-31
# 用途：CI门槛评估 — Recall@5/MRR/Precision@5/CitationAccuracy
# 规范：每次索引构建/检索策略变更后必须通过所有评估门槛

meta:
  version: "1.0"
  created_at: "2026-05-31"
  total_queries: 220
  disciplines_covered:
    - water
    - fire
    - process
    - piping
    - instrument
    - electrical
    - equipment
    - hse
  query_types:
    - exact_lookup       # 精确查找（规范号+条款号）
    - numeric_lookup     # 数值查询（最小管径、最大流速等）
    - concept_search     # 概念检索（消防供水要求等）
    - cross_reference    # 跨引用检索
    - mandatory_filter   # 强制性别过滤
    - ambiguous_term     # 模糊术语（同义词/缩写）
    - negative_query     # 否定查询（知识库不应有的内容）
    - multi_discipline   # 跨专业查询

# ============================================================
# 评估门槛（CI阻断条件）
# ============================================================
thresholds:
  recall_at_5: 0.90       # Recall@5 — 正确答案在top-5中的比例
  mrr: 0.80               # MRR — 第一个正确答案的平均倒数排名
  precision_at_5: 0.75    # Precision@5 — top-5中相关结果的比例
  citation_accuracy: 0.99 # Citation Accuracy — 引用指向正确条文的比例

