*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;line-height:1.5}
.hdr{padding:16px 24px;background:#161b22;border-bottom:1px solid #30363d;display:flex;justify-content:space-between;align-items:center}
.hdr h1{font-size:18px;color:#58a6ff}
.hdr .ts{font-size:12px;color:#8b949e}
.stats{display:flex;gap:12px;padding:12px 24px;background:#161b22;border-bottom:1px solid #30363d;flex-wrap:wrap}
.s{background:#21262d;padding:8px 14px;border-radius:8px;text-align:center;min-width:80px}
.s .n{font-size:20px;font-weight:700}.s .l{font-size:11px;color:#8b949e}
.tabs{display:flex;padding:0 24px;background:#161b22;border-bottom:1px solid #30363d}
.tab{padding:10px 18px;cursor:pointer;color:#8b949e;border-bottom:2px solid transparent;font-size:13px;transition:.2s}
.tab.on{color:#58a6ff;border-bottom-color:#58a6ff}
.tab:hover{color:#c9d1d9}
.p{display:none;padding:24px}.p.on{display:block}
/* Architecture diagram */
.arch{display:flex;flex-direction:column;gap:24px;max-width:1200px;margin:0 auto}
.layer{border:1px solid #30363d;border-radius:12px;overflow:hidden}
.layer-hdr{padding:12px 20px;background:#21262d;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
.layer-hdr h3{font-size:14px;color:#58a6ff}
.layer-hdr .cnt{font-size:12px;color:#8b949e;background:#30363d;padding:2px 8px;border-radius:10px}
.layer-body{padding:16px 20px;display:flex;flex-wrap:wrap;gap:8px}
.node{padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;transition:.2s;position:relative;border:1px solid transparent}
.node:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.node .badge{position:absolute;top:-6px;right:-6px;background:#30363d;color:#8b949e;font-size:9px;padding:1px 4px;border-radius:8px}
/* Colors */
.c-skill{background:#1a3a5c;border-color:#2C5F8A;color:#7eb8f0}
.c-mcp{background:#3d2e0a;border-color:#B07D1A;color:#f0c060}
.c-disc{background:#0a2a3d;border-color:#2980B9;color:#60b8f0}
.c-event{background:#3d0a0a;border-color:#C0392B;color:#f06060}
.c-formula{background:#2a1a3d;border-color:#9A5A8E;color:#d0a0e0}
.c-table{background:#1a2a2a;border-color:#7F8C8D;color:#a0c0c0}
/* Detail panel */
.detail{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:20px;margin-top:16px}
.detail h4{color:#58a6ff;margin-bottom:8px;font-size:14px}
.detail .rel{display:flex;gap:16px;flex-wrap:wrap;margin:8px 0}
.detail .rel-item{background:#21262d;padding:4px 10px;border-radius:6px;font-size:12px}
.rel-item.to{border-left:3px solid #7BC67E}
.rel-item.from{border-left:3px solid #E8A838}
.rel-item.ev{border-left:3px solid #E74C3C}
/* Search */
.search{padding:8px 24px;background:#161b22}
.search input{width:100%;max-width:400px;padding:6px 12px;background:#21262d;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:13px}
.search input:focus{outline:none;border-color:#58a6ff}
/* Table view */
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:6px 10px;text-align:left;border:1px solid #30363d}
th{background:#21262d;color:#58a6ff;position:sticky;top:0}
td{background:#161b22}
tr:hover td{background:#1c2333}
.tbl-wrap{max-height:70vh;overflow:auto}
/* Connection lines */
.conn{margin:16px 0;padding:16px;background:#161b22;border:1px solid #30363d;border-radius:8px}
.conn-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px}
.conn-row .arrow{color:#58a6ff;font-weight:700}
.conn-row .lbl{color:#8b949e;font-size:11px}
.highlight{background:#1f6feb33 !important;border-color:#58a6ff !important}
</style>

// ============ Architecture View ============
function renderArch() {
  const el = document.getElementById('p-arch');
  const layers = [
    {title:'专业层', type:'discipline', desc:'10 个专业领域'},
    {title:'Skill 层', type:'skill', desc:'35 个数字工程师'},
    {title:'MCP 服务层', type:'mcp', desc:'4 个微服务，29 个工具'},
    {title:'事件总线', type:'event', desc:'14 种事件类型'},
  ];
  let html = '<div class="arch">';
  for (const layer of layers) {
    const nodes = G.nodes.filter(n => n.type === layer.type);
    html += `<div class="layer">`;
    html += `<div class="layer-hdr" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'flex':'none'">`;
    html += `<h3>${layer.title}</h3><span class="cnt">${nodes.length} 个 · ${layer.desc}</span></div>`;
    html += `<div class="layer-body">`;
    for (const n of nodes) {
      const connCount = G.edges.filter(e => e.from === n.id || e.to === n.id).length;
      const cls = 'c-' + (n.type === 'discipline' ? 'disc' : n.type);
      html += `<div class="node ${cls}" data-id="${n.id}" onclick="showDetail('${n.id}')" title="${n.id}">`;
      html += `${n.name}`;
      if (connCount > 2) html += `<span class="badge">${connCount}</span>`;
      html += `</div>`;
    }
    html += `</div></div>`;
  }
  // Connection summary
  html += `<div class="layer"><div class="layer-hdr"><h3>关键连接</h3><span class="cnt">${G.meta.edge_count} 条</span></div>`;
  html += `<div class="layer-body" style="flex-direction:column;gap:4px">`;
  const keyTypes = ['SKILL_MCP','SKILL_MANAGES','SKILL_REPORTS_TO','EVENT_PRODUCER','EVENT_CONSUMER'];
  const typeNames = {SKILL_MCP:'依赖',SKILL_MANAGES:'管理',SKILL_REPORTS_TO:'汇报',EVENT_PRODUCER:'发布',EVENT_CONSUMER:'订阅'};
  const typeColor = {SKILL_MCP:'#58a6ff',SKILL_MANAGES:'#7BC67E',SKILL_REPORTS_TO:'#7BC67E',EVENT_PRODUCER:'#E74C3C',EVENT_CONSUMER:'#E74C3C'};
  for (const t of keyTypes) {
    const edges = G.edges.filter(e => e.type === t);
    if (!edges.length) continue;
    html += `<div style="font-size:12px;color:${typeColor[t]};margin-top:4px"><b>${typeNames[t]}</b>（${edges.length} 条）</div>`;
    for (const e of edges.slice(0, 8)) {
      const from = N(e.from), to = N(e.to);
      html += `<div class="conn-row"><span style="color:#8b949e;min-width:120px">${from?.name||e.from}</span><span class="arrow">→</span><span style="color:#8b949e;min-width:120px">${to?.name||e.to}</span><span class="lbl">${e.label}</span></div>`;
    }
    if (edges.length > 8) html += `<div class="conn-row" style="color:#8b949e">... 还有 ${edges.length - 8} 条</div>`;
  }
  html += `</div></div>`;
  html += '</div>';
  el.innerHTML = html;
}
renderArch();

// ============ Detail Panel ============
function showDetail(id) {
  const node = N(id);
  if (!node) return;
  // Remove previous detail
  document.querySelectorAll('.detail').forEach(d => d.remove());
  const outEdges = G.edges.filter(e => e.from === id);
  const inEdges = G.edges.filter(e => e.to === id);
  let html = `<div class="detail"><h4>${node.name} <span style="color:#8b949e;font-size:12px">(${node.type} · ${node.id})</span></h4>`;
  if (outEdges.length) {
    html += `<div style="margin-top:8px"><b style="font-size:12px;color:#7BC67E">输出 →</b></div><div class="rel">`;
    for (const e of outEdges) {
      const to = N(e.to);
      html += `<div class="rel-item to">${to?.name||e.to} <span style="color:#8b949e">(${e.label})</span></div>`;
    }
    html += `</div>`;
  }
  if (inEdges.length) {
    html += `<div style="margin-top:8px"><b style="font-size:12px;color:#E8A838">输入 ←</b></div><div class="rel">`;
    for (const e of inEdges) {
      const from = N(e.from);
      html += `<div class="rel-item from">${from?.name||e.from} <span style="color:#8b949e">(${e.label})</span></div>`;
    }
    html += `</div>`;
  }
  html += `</div>`;
  // Insert after the clicked node's layer
  const nodeEl = document.querySelector(`[data-id="${id}"]`);
  if (nodeEl) {
    const layer = nodeEl.closest('.layer');
    if (layer) layer.insertAdjacentHTML('afterend', html);
  }
}

// ============ Skill Detail View ============
function renderSkillView() {
  const el = document.getElementById('p-skill');
  const skills = G.nodes.filter(n => n.type === 'skill');
  const byGroup = {};
  for (const s of skills) {
    const g = s.group || '其他';
    if (!byGroup[g]) byGroup[g] = [];
    byGroup[g].push(s);
  }
  let html = '';
  for (const [group, list] of Object.entries(byGroup)) {
    html += `<div class="layer" style="margin-bottom:16px"><div class="layer-hdr"><h3>${group}</h3><span class="cnt">${list.length} 个 Skill</span></div>`;
    html += `<div style="padding:12px 20px"><table><tr><th>Skill</th><th>MCP 依赖</th><th>管理</th><th>汇报至</th></tr>`;
    for (const s of list) {
      const mcps = edgesFrom(s.id, 'SKILL_MCP').map(e => N(e.to)?.name || e.to);
      const manages = edgesFrom(s.id, 'SKILL_MANAGES').map(e => N(e.to)?.name || e.to);
      const reports = edgesFrom(s.id, 'SKILL_REPORTS_TO').map(e => N(e.to)?.name || e.to);
      html += `<tr><td><b>${s.name}</b></td><td>${mcps.join(', ')||'-'}</td><td>${manages.join(', ')||'-'}</td><td>${reports.join(', ')||'-'}</td></tr>`;
    }
    html += `</table></div></div>`;
  }
  el.innerHTML = html;
}
renderSkillView();

// ============ MCP View ============
function renderMCPView() {
  const el = document.getElementById('p-mcp');
  let html = '';
  for (const m of G.nodes.filter(n => n.type === 'mcp')) {
    const tools = edgesFrom(m.id, 'MCP_TOOL').map(e => N(e.to)?.name || e.to);
    const skills = edgesTo(m.id, 'SKILL_MCP').map(e => N(e.from)?.name || e.from);
    html += `<div class="layer" style="margin-bottom:16px"><div class="layer-hdr"><h3>${m.name}</h3><span class="cnt">${tools.length} 工具 · ${skills.length} Skill</span></div>`;
    html += `<div style="padding:12px 20px">`;
    html += `<div style="margin-bottom:8px"><b style="color:#7BC67E;font-size:12px">工具列表：</b></div><div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">`;
    for (const t of tools) html += `<span class="node c-mcp" style="cursor:default">${t}</span>`;
    html += `</div>`;
    html += `<div><b style="color:#E8A838;font-size:12px">依赖此服务的 Skill：</b></div><div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">`;
    for (const s of skills) html += `<span class="node c-skill" style="cursor:default">${s}</span>`;
    html += `</div></div></div>`;
  }
  el.innerHTML = html;
}
renderMCPView();

// ============ Event View ============
function renderEventView() {
  const el = document.getElementById('p-event');
  let html = '<div class="layer"><div class="layer-hdr"><h3>事件驱动关系</h3><span class="cnt">14 种事件</span></div>';
  html += `<div style="padding:12px 20px"><table><tr><th>事件</th><th>发布者</th><th>订阅者</th></tr>`;
  for (const ev of G.nodes.filter(n => n.type === 'event')) {
    const producers = edgesTo(ev.id, 'EVENT_PRODUCER').map(e => N(e.from)?.name || e.from);
    const consumers = edgesFrom(ev.id, 'EVENT_CONSUMER').map(e => N(e.to)?.name || e.to);
    html += `<tr><td><code>${ev.name}</code></td><td>${producers.join(', ')||'（通配）'}</td><td>${consumers.join(', ')||'（通配）'}</td></tr>`;
  }
  html += `</table></div></div>`;
  el.innerHTML = html;
}
renderEventView();

// ============ Formula View ============
function renderFormulaView() {
  const el = document.getElementById('p-formula');
  const discs = G.meta.formula_disciplines;
  let html = `<div class="layer" style="margin-bottom:16px"><div class="layer-hdr"><h3>公式分布</h3><span class="cnt">${G.meta.by_type.formula} 条公式</span></div>`;
  html += `<div style="padding:12px 20px;display:flex;gap:16px;flex-wrap:wrap">`;
  for (const [d, c] of Object.entries(discs)) {
    const pct = Math.round(c / G.meta.by_type.formula * 100);
    html += `<div style="flex:1;min-width:150px;background:#21262d;padding:12px;border-radius:8px;text-align:center">`;
    html += `<div style="font-size:28px;font-weight:700;color:${typeColors.formula}">${c}</div>`;
    html += `<div style="font-size:12px;color:#8b949e">${d}</div>`;
    html += `<div style="margin-top:6px;height:4px;background:#30363d;border-radius:2px"><div style="height:100%;width:${pct}%;background:${typeColors.formula};border-radius:2px"></div></div>`;
    html += `<div style="font-size:10px;color:#8b949e;margin-top:2px">${pct}%</div></div>`;
  }
  html += `</div></div>`;
  // Formula-table refs
  const tableRefs = G.edges.filter(e => e.type === 'FORMULA_TABLE');
  if (tableRefs.length) {
    html += `<div class="layer"><div class="layer-hdr"><h3>公式 → 参数表引用</h3><span class="cnt">${tableRefs.length} 条</span></div>`;
    html += `<div style="padding:12px 20px"><table><tr><th>公式</th><th>参数</th><th>参数表</th></tr>`;
    for (const e of tableRefs) {
      const f = N(e.from), t = N(e.to);
      html += `<tr><td>${f?.name||e.from}</td><td>${e.label}</td><td>${typeof t?.name === 'string' ? t.name : JSON.stringify(t?.name)}</td></tr>`;
    }
    html += `</table></div></div>`;
  }
  el.innerHTML = html;
}
renderFormulaView();

// ============ JSON View ============
document.getElementById('json-out').textContent = JSON.stringify(G, null, 2);

// ============ Search ============
function doSearch(q) {
  q = q.toLowerCase();
  document.querySelectorAll('.node').forEach(n => {
    if (!q) { n.style.display = ''; n.classList.remove('highlight'); return; }
    const match = n.textContent.toLowerCase().includes(q) || n.dataset.id?.toLowerCase().includes(q);
    n.style.display = match ? '' : 'none';
    if (match && q.length > 1) n.classList.add('highlight');
    else n.classList.remove('highlight');
  });
}
