<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:freecad="https://www.freecad.org/wiki/index.php?title=Svg_Namespace"
     width="420mm" height="297mm" viewBox="0 0 420 297">

  <!-- A3 landscape frame, GB/T 14689 simplified: binding margin 25mm, others 5mm -->
  <g style="stroke:#000000;stroke-width:0.7;fill:none">
    <rect x="25" y="5" width="390" height="287"/>
  </g>
  <g style="stroke:#000000;stroke-width:0.18;fill:none">
    <rect x="0.5" y="0.5" width="419" height="296"/>
  </g>

  <!-- Title block, bottom-right 180x32, simplified GB style -->
  <g style="stroke:#000000;stroke-width:0.5;fill:none">
    <rect x="235" y="260" width="180" height="32"/>
    <line x1="235" y1="276" x2="415" y2="276"/>
    <line x1="335" y1="260" x2="335" y2="292"/>
    <line x1="335" y1="268" x2="415" y2="268"/>
    <line x1="335" y1="284" x2="415" y2="284"/>
    <line x1="375" y1="276" x2="375" y2="292"/>
  </g>

  <!-- Fixed captions -->
  <text x="238" y="266" style="font-size:3px;fill:#000000">PROJECT</text>
  <text x="238" y="282" style="font-size:3px;fill:#000000">TITLE</text>
  <text x="338" y="265" style="font-size:3px;fill:#000000">DWG NO.</text>
  <text x="338" y="281" style="font-size:3px;fill:#000000">SCALE</text>
  <text x="378" y="281" style="font-size:3px;fill:#000000">REV</text>

  <!-- Editable fields -->
  <text x="262" y="272" freecad:editable="ProjectName"
        style="font-size:5px;fill:#000000"><tspan>PROJECT NAME</tspan></text>
  <text x="262" y="288" freecad:editable="DrawingTitle"
        style="font-size:5px;fill:#000000"><tspan>PROCESS FLOW DIAGRAM</tspan></text>
  <text x="352" y="265" freecad:editable="DrawingNumber"
        style="font-size:4px;fill:#000000"><tspan>PFD-001</tspan></text>
  <text x="350" y="281" freecad:editable="Scale"
        style="font-size:4px;fill:#000000"><tspan>1:2</tspan></text>
  <text x="392" y="281" freecad:editable="Revision"
        style="font-size:4px;fill:#000000"><tspan>A</tspan></text>
  <text x="338" y="290" style="font-size:2.5px;fill:#000000">Generated by CAD Intelligence</text>
</svg>
